<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Natskyll">
<title>Natskyller</title>
<style>
  :root{
    --bg:#0E1419;
    --surface:#18222B;
    --raised:#1F2D38;
    --line:#2E3F4C;
    --text:#E8EDF1;
    --muted:#8A9BA8;
    --amber:#E0A663;
    --amber-dim:#9c7644;
    --sea:#5FB890;
    --sea-dim:#2f5d49;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    line-height:1.4;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 18px 64px;}

  /* Header */
  header{margin:8px 0 22px;}
  .eyebrow{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--amber);font-weight:700;
  }
  .shift{
    font-size:13px;color:var(--muted);margin-top:4px;
    font-variant-numeric:tabular-nums;
  }
  .shift b{color:var(--text);font-weight:600;}
  .dayrow{display:flex;align-items:baseline;gap:12px;margin-top:14px;}
  .weekday{
    font-size:46px;font-weight:800;letter-spacing:-.02em;line-height:.95;
    margin:0;text-transform:capitalize;
  }
  .date{font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;}

  /* Progress */
  .prog{margin-top:16px;}
  .progbar{height:6px;border-radius:4px;background:var(--raised);overflow:hidden;}
  .progfill{height:100%;width:0;background:var(--sea);border-radius:4px;transition:width .35s ease;}
  .progtxt{font-size:12px;color:var(--muted);margin-top:7px;font-variant-numeric:tabular-nums;}

  /* Section */
  .sec{margin-top:26px;}
  .sec-h{
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);font-weight:700;margin:0 0 10px 2px;
  }

  /* Djupstäd highlight card */
  .deep{
    background:linear-gradient(160deg,#241d12,#1a1810);
    border:1px solid var(--amber-dim);
    border-radius:16px;padding:4px 4px 8px;
    box-shadow:0 0 0 1px rgba(224,166,99,.06), 0 8px 24px rgba(0,0,0,.3);
  }
  .deep .deep-label{
    display:flex;align-items:center;gap:8px;
    padding:13px 14px 9px;
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--amber);font-weight:700;
  }
  .deep .deep-label::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);}

  /* Task rows */
  ul.tasks{list-style:none;margin:0;padding:0;}
  .task{
    display:flex;align-items:flex-start;gap:13px;
    padding:13px 14px;min-height:52px;cursor:pointer;
    border-top:1px solid var(--line);
    transition:background .12s ease;
    user-select:none;
  }
  .group .task:first-child{border-top:none;}
  .deep .task:first-of-type{border-top:1px solid var(--amber-dim);}
  .deep .task{border-top-color:rgba(224,166,99,.18);}
  .task:active{background:rgba(255,255,255,.03);}
  .box{
    flex:0 0 auto;width:24px;height:24px;border-radius:7px;margin-top:1px;
    border:2px solid var(--line);background:transparent;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .15s ease, background .15s ease;
  }
  .deep .box{border-color:var(--amber-dim);}
  .box svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:opacity .15s ease,transform .15s ease;}
  .task.done .box{background:var(--sea);border-color:var(--sea);}
  .task.done .box svg{opacity:1;transform:scale(1);}
  .label{font-size:15.5px;flex:1;padding-top:1px;}
  .task.done .label{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sea-dim);}
  .note{display:block;font-size:12.5px;color:var(--amber);margin-top:3px;font-weight:600;}
  .task.done .note{color:var(--sea-dim);text-decoration:none;}

  .group{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .group + .group{margin-top:12px;}

  /* Week overview */
  .weekbtn{
    width:100%;text-align:left;background:var(--surface);color:var(--text);
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center;
    cursor:pointer;
  }
  .weekbtn .chev{color:var(--muted);transition:transform .2s ease;}
  .weekbtn.open .chev{transform:rotate(180deg);}
  .weekpanel{display:none;margin-top:10px;}
  .weekpanel.open{display:block;}
  .wday{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:8px;
  }
  .wday.today{border-color:var(--amber-dim);background:linear-gradient(160deg,#1f1c14,var(--surface));}
  .wday h4{
    margin:0 0 6px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);font-weight:700;display:flex;justify-content:space-between;
  }
  .wday.today h4{color:var(--amber);}
  .wday p{margin:4px 0;font-size:13.5px;color:var(--text);}
  .wday .em{color:var(--amber);font-weight:600;}

  footer{margin-top:30px;text-align:center;color:#566876;font-size:11px;letter-spacing:.04em;}
  .reset{
    background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:8px;padding:7px 14px;font-size:12px;margin-top:14px;cursor:pointer;
  }
  .reset:active{background:var(--raised);}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Natskyller · M/S Nordic Crown</div>
    <div class="shift">Pass <b>17:00–04:30</b> · 2×30 min rast · 10,5 h</div>
    <div class="dayrow">
      <h1 class="weekday" id="weekday">—</h1>
      <span class="date" id="date"></span>
    </div>
    <div class="prog">
      <div class="progbar"><div class="progfill" id="progfill"></div></div>
      <div class="progtxt" id="progtxt">0 av 0 klara</div>
    </div>
  </header>

  <section class="sec">
    <div class="deep">
      <div class="deep-label">Nattens djupstäd</div>
      <ul class="tasks" id="deeplist"></ul>
    </div>
  </section>

  <section class="sec" id="dailywrap"></section>

  <section class="sec">
    <button class="weekbtn" id="weekbtn">Hela veckans djupstäd <span class="chev">▾</span></button>
    <div class="weekpanel" id="weekpanel"></div>
  </section>

  <div style="text-align:center">
    <button class="reset" id="reset">Nollställ dagens bockar</button>
  </div>

  <footer>Bockarna nollställs automatiskt varje nytt dygn.</footer>
</div>

<script>
"use strict";

/* ---------- Robust storage (localStorage w/ in-memory fallback) ---------- */
const store = (() => {
  let mem = {}, ok = true;
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); }
  catch(e){ ok = false; }
  return {
    get(k){ try { return ok ? localStorage.getItem(k) : (k in mem ? mem[k] : null); } catch(e){ return k in mem ? mem[k] : null; } },
    set(k,v){ try { ok ? localStorage.setItem(k,v) : (mem[k]=v); } catch(e){ mem[k]=v; } }
  };
})();

/* ---------- Data ---------- */
// Mon-first index 0..6
const WEEKDAYS = ["Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag","Söndag"];

const DEEP = [
  // Måndag
  [
    {id:"mo1", t:"Fläktkåpor – KULL · BESÄTTNING · SYD · NORD", n:"Endast invändigt"},
    {id:"mo2", t:"Avlopp & galler i à la carte-köket", n:"Extra grundligt"}
  ],
  // Tisdag
  [
    {id:"tu1", t:"Barnbuffé – skåp & väggar i SKAGERAK"},
    {id:"tu2", t:"Tak – KULL · BESÄTTNING · SKAGERAK"}
  ],
  // Onsdag
  [
    {id:"we1", t:"Tak – SYD · NORD"},
    {id:"we2", t:"Avlopp & galler – SYD · NORD", n:"Extra grundligt"},
    {id:"we3", t:"Nattmat i mässen"}
  ],
  // Torsdag
  [
    {id:"th1", t:"Avlopp & galler i SKAGERAK-köket", n:"Extra grundligt"}
  ],
  // Fredag
  [
    {id:"fr1", t:"Alla kyl- & värmeskåp i SKAGERAK-buffén"},
    {id:"fr2", t:"Ångrengöraren ända in i kanterna", n:"Glöm inte hörnen"}
  ],
  // Lördag
  [
    {id:"sa1", t:"Hiss"},
    {id:"sa2", t:"Spillbrickor från utsuget – runda i taket, KULL"},
    {id:"sa3", t:"Nattmat i mässen"}
  ],
  // Söndag
  [
    {id:"su1", t:"Filter & fläktkåpor – SKAGERAK", n:"Invändigt, utvändigt & kanter"},
    {id:"su2", t:"Fläktkåpor – KULL · BESÄTTNING · SYD · NORD", n:"Endast utvändigt & kanter"}
  ]
];

const DAILY = [
  { h:"Löpande ansvar", items:[
    {id:"d1", t:"Allt porslin & utrustning diskat och klart för kockar/servitörer"},
    {id:"d2", t:"Disken flyter smärtfritt – gästerna får en bra upplevelse"},
    {id:"d3", t:"Rent & i ordning runt kabyssen"}
  ]},
  { h:"Kväll – till ca 22:00", items:[
    {id:"d4", t:"Disktrasor, kökshanddukar & textil på däck 1"},
    {id:"d5", t:"Assistera kollegor med kvällsservice"}
  ]},
  { h:"Dagligt", items:[
    {id:"d6", t:"Skura golv i alla tre kök"},
    {id:"d7", t:"Städa upp i mässen"},
    {id:"d8", t:"Tvätta & fyll på trasor/handdukar – däck 1"},
    {id:"d9", t:"Fyll på i kabyssen"},
    {id:"d10", t:"Lås dörrarna till kabyssen"}
  ]},
  { h:"Innan passet slut", items:[
    {id:"d11", t:"Tvål-, papper- & lotiondispensrar fyllda i hela kabyssen"},
    {id:"d12", t:"Vilotider ej överskridna"},
    {id:"d13", t:"Informera Head Chef vid behov av övertid"}
  ]}
];

/* ---------- State ---------- */
// Passet börjar 17:00 och slutar 04:30 nästa dygn.
// Brytpunkt 06:00 -> allt mellan 00:00 och 06:00 tillhör gårdagens pass.
const CUTOFF_HOUR = 6;
const realNow = new Date();
const now = new Date(realNow.getTime() - CUTOFF_HOUR*60*60*1000); // "skiftdygn"
const isoDate = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
const STKEY = "natskyll:"+isoDate;
// Mon-first: JS getDay 0=Sun..6=Sat -> (d+6)%7
const wd = (now.getDay()+6)%7;

let checked = {};
try { checked = JSON.parse(store.get(STKEY) || "{}") || {}; } catch(e){ checked = {}; }

function save(){ store.set(STKEY, JSON.stringify(checked)); }

/* ---------- Render ---------- */
const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#0E1419" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

function taskRow(item){
  const li = document.createElement("li");
  li.className = "task" + (checked[item.id] ? " done":"");
  li.dataset.id = item.id;
  li.innerHTML =
    '<span class="box">'+CHECK_SVG+'</span>'+
    '<span class="label">'+item.t+(item.n?'<span class="note">'+item.n+'</span>':'')+'</span>';
  li.addEventListener("click", () => toggle(item.id, li));
  return li;
}

function toggle(id, el){
  checked[id] = !checked[id];
  el.classList.toggle("done", !!checked[id]);
  save();
  updateProgress();
}

function buildDeep(){
  const list = document.getElementById("deeplist");
  list.innerHTML = "";
  DEEP[wd].forEach(it => list.appendChild(taskRow(it)));
}

function buildDaily(){
  const wrap = document.getElementById("dailywrap");
  wrap.innerHTML = '<div class="sec-h">Dagligt – varje pass</div>';
  DAILY.forEach(g => {
    const gh = document.createElement("div");
    gh.className = "sec-h";
    gh.style.marginTop = "16px";
    gh.textContent = g.h;
    const box = document.createElement("div");
    box.className = "group";
    const ul = document.createElement("ul");
    ul.className = "tasks";
    g.items.forEach(it => ul.appendChild(taskRow(it)));
    box.appendChild(ul);
    wrap.appendChild(gh);
    wrap.appendChild(box);
  });
}

function allIds(){
  return [...DEEP[wd].map(x=>x.id), ...DAILY.flatMap(g=>g.items.map(x=>x.id))];
}

function updateProgress(){
  const ids = allIds();
  const done = ids.filter(id => checked[id]).length;
  const pct = ids.length ? Math.round(done/ids.length*100) : 0;
  document.getElementById("progfill").style.width = pct+"%";
  document.getElementById("progtxt").textContent = done+" av "+ids.length+" klara";
}

function buildWeek(){
  const panel = document.getElementById("weekpanel");
  panel.innerHTML = "";
  WEEKDAYS.forEach((name,i) => {
    const d = document.createElement("div");
    d.className = "wday" + (i===wd ? " today":"");
    let html = '<h4>'+name+(i===wd?'<span>idag</span>':'')+'</h4>';
    DEEP[i].forEach(it => {
      html += '<p>'+it.t+(it.n?' <span class="em">· '+it.n+'</span>':'')+'</p>';
    });
    d.innerHTML = html;
    panel.appendChild(d);
  });
}

/* ---------- Init ---------- */
document.getElementById("weekday").textContent = WEEKDAYS[wd];
document.getElementById("date").textContent =
  now.toLocaleDateString("sv-SE",{day:"numeric",month:"long"});

buildDeep();
buildDaily();
buildWeek();
updateProgress();

document.getElementById("weekbtn").addEventListener("click", e => {
  e.currentTarget.classList.toggle("open");
  document.getElementById("weekpanel").classList.toggle("open");
});

document.getElementById("reset").addEventListener("click", () => {
  checked = {};
  save();
  document.querySelectorAll(".task.done").forEach(el => el.classList.remove("done"));
  updateProgress();
});
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
