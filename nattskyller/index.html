<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Natskyll">
<title>Natskyller</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#0E1419;
    --surface:#18222B;
    --raised:#1F2D38;
    --line:#2E3F4C;
    --text:#E8EDF1;
    --muted:#8A9BA8;
    --amber:#E0A663;
    --amber-dim:#9c7644;
    --sea:#5FB890;
    --sea-dim:#2f5d49;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    line-height:1.4;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 18px 64px;}

  .tabbar{
    display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:5px;margin:6px 0 20px;
    position:sticky;top:8px;z-index:10;backdrop-filter:blur(6px);
  }
  .tab{
    flex:1;border:none;background:transparent;color:var(--muted);
    font-size:14px;font-weight:700;padding:11px 8px;border-radius:8px;cursor:pointer;
    transition:background .15s ease,color .15s ease;
  }
  .tab.active{background:var(--raised);color:var(--text);}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);font-weight:700;}
  .shift{font-size:13px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums;}
  .shift b{color:var(--text);font-weight:600;}
  .dayrow{display:flex;align-items:baseline;gap:12px;margin-top:14px;}
  .weekday{font-size:46px;font-weight:800;letter-spacing:-.02em;line-height:.95;margin:0;text-transform:capitalize;}
  .date{font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;}

  .prog{margin-top:16px;}
  .progbar{height:6px;border-radius:4px;background:var(--raised);overflow:hidden;}
  .progfill{height:100%;width:0;background:var(--sea);border-radius:4px;transition:width .35s ease;}
  .progtxt{font-size:12px;color:var(--muted);margin-top:7px;font-variant-numeric:tabular-nums;}

  .sec{margin-top:26px;}
  .sec-h{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 10px 2px;}

  .deep{
    background:linear-gradient(160deg,#241d12,#1a1810);
    border:1px solid var(--amber-dim);border-radius:16px;padding:4px 4px 8px;
    box-shadow:0 0 0 1px rgba(224,166,99,.06), 0 8px 24px rgba(0,0,0,.3);
  }
  .deep .deep-label{
    display:flex;align-items:center;gap:8px;padding:13px 14px 9px;
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:700;
  }
  .deep .deep-label::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);}

  ul.tasks{list-style:none;margin:0;padding:0;}
  .task{
    display:flex;align-items:flex-start;gap:13px;padding:13px 14px;min-height:52px;cursor:pointer;
    border-top:1px solid var(--line);transition:background .12s ease;user-select:none;
  }
  .group .task:first-child{border-top:none;}
  .deep .task:first-of-type{border-top:1px solid var(--amber-dim);}
  .deep .task{border-top-color:rgba(224,166,99,.18);}
  .task:active{background:rgba(255,255,255,.03);}
  .box{
    flex:0 0 auto;width:24px;height:24px;border-radius:7px;margin-top:1px;
    border:2px solid var(--line);background:transparent;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .15s ease, background .15s ease;
  }
  .deep .box{border-color:var(--amber-dim);}
  .box svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:opacity .15s ease,transform .15s ease;}
  .task.done .box{background:var(--sea);border-color:var(--sea);}
  .task.done .box svg{opacity:1;transform:scale(1);}
  .label{font-size:15.5px;flex:1;padding-top:1px;}
  .task.done .label{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sea-dim);}
  .note{display:block;font-size:12.5px;color:var(--amber);margin-top:3px;font-weight:600;}
  .task.done .note{color:var(--sea-dim);text-decoration:none;}

  .group{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;}

  .reset{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:7px 14px;font-size:12px;margin-top:18px;cursor:pointer;}
  .reset:active{background:var(--raised);}

  .wday{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:9px;}
  .wday.today{border-color:var(--amber-dim);background:linear-gradient(160deg,#1f1c14,var(--surface));}
  .wday h4{margin:0 0 7px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;display:flex;justify-content:space-between;align-items:center;}
  .wday.today h4{color:var(--amber);}
  .wday h4 .badge{font-size:10px;background:var(--amber);color:#1a130a;padding:2px 8px;border-radius:20px;letter-spacing:.08em;}
  .wday p{margin:5px 0;font-size:14px;color:var(--text);display:flex;gap:8px;}
  .wday p::before{content:"–";color:var(--amber-dim);}
  .wday .em{color:var(--amber);font-weight:600;}

  .ref{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 16px;}
  .ref .rg{margin-top:12px;}
  .ref .rg:first-child{margin-top:0;}
  .ref .rg h5{margin:0 0 6px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .ref .rg p{margin:4px 0;font-size:13.5px;color:var(--text);display:flex;gap:8px;}
  .ref .rg p::before{content:"·";color:var(--amber-dim);font-weight:700;}

  .breakchip{
    display:none;align-items:center;gap:6px;margin-top:14px;
    background:var(--raised);border:1px solid var(--line);color:var(--muted);
    font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:20px;
    font-variant-numeric:tabular-nums;
  }
  .breakchip.now{background:linear-gradient(160deg,#1f1c14,#241d12);border-color:var(--amber-dim);color:var(--amber);}

  .firststep{
    display:flex;align-items:center;gap:14px;margin-top:22px;padding:15px 16px;
    background:linear-gradient(160deg,#12211c,#0f1a17);
    border:1px solid var(--sea-dim);border-radius:16px;cursor:pointer;user-select:none;
  }
  .firststep .fs-num{
    flex:0 0 auto;width:30px;height:30px;border-radius:50%;
    background:var(--sea);color:#0c1512;font-weight:800;font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .firststep .fs-body{flex:1;}
  .firststep .fs-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--sea);font-weight:700;}
  .firststep .fs-title{font-size:15.5px;font-weight:600;margin-top:3px;}
  .firststep .fs-box{
    flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid var(--sea-dim);
    display:flex;align-items:center;justify-content:center;
  }
  .firststep .fs-box svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:opacity .15s,transform .15s;}
  .firststep.done .fs-box{background:var(--sea);border-color:var(--sea);}
  .firststep.done .fs-box svg{opacity:1;transform:scale(1);}
  .firststep.done .fs-title{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--sea-dim);}
  .firststep.done .fs-num{opacity:.5;}

  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(30px);
    background:var(--amber);color:#1a130a;font-weight:700;font-size:14px;
    padding:13px 20px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;max-width:90%;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}

  footer{margin-top:30px;text-align:center;color:#566876;font-size:11px;letter-spacing:.04em;}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="tabbar">
    <button class="tab active" data-tab="idag">Idag</button>
    <button class="tab" data-tab="vecka">Hela veckan</button>
  </div>

  <div class="panel active" id="panel-idag">
    <div class="eyebrow">Natskyller · M/S Nordic Crown</div>
    <div class="shift">Pass <b>17:00–04:30</b> · 2×30 min rast · 10,5 h</div>
    <div class="dayrow">
      <h1 class="weekday" id="weekday">—</h1>
      <span class="date" id="date"></span>
    </div>
    <div class="prog">
      <div class="progbar"><div class="progfill" id="progfill"></div></div>
      <div class="progtxt" id="progtxt">0 av 0 klara</div>
    </div>

    <div class="breakchip" id="breakchip"></div>

    <div class="firststep" id="firststep">
      <div class="fs-num">1</div>
      <div class="fs-body">
        <div class="fs-label">Först när du kommer in</div>
        <div class="fs-title">Starta tvätten – trasor &amp; textil, däck 1</div>
      </div>
      <span class="fs-box"><svg viewBox="0 0 24 24" fill="none" stroke="#0E1419" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
    </div>

    <section class="sec">
      <div class="deep">
        <div class="deep-label">Nattens djupstäd</div>
        <ul class="tasks" id="deeplist"></ul>
      </div>
    </section>

    <section class="sec" id="dailywrap"></section>

    <div style="text-align:center">
      <button class="reset" id="reset">Nollställ dagens bockar</button>
    </div>
  </div>

  <div class="panel" id="panel-vecka">
    <div class="eyebrow">Veckoöversikt · djupstäd</div>
    <div class="sec" id="weekwrap" style="margin-top:14px"></div>

    <div class="sec">
      <div class="sec-h">Varje pass – dagligt</div>
      <div class="ref" id="refwrap"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>Bockarna nollställs automatiskt kl 06:00 varje nytt skiftdygn.</footer>
</div>

<script>
"use strict";

const store = (() => {
  let mem = {}, ok = true;
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); }
  catch(e){ ok = false; }
  return {
    get(k){ try { return ok ? localStorage.getItem(k) : (k in mem ? mem[k] : null); } catch(e){ return k in mem ? mem[k] : null; } },
    set(k,v){ try { ok ? localStorage.setItem(k,v) : (mem[k]=v); } catch(e){ mem[k]=v; } }
  };
})();

const WEEKDAYS = ["Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag","Söndag"];

const DEEP = [
  [ {id:"mo1", t:"Fläktkåpor – KULL · BESÄTTNING · SYD · NORD", n:"Endast invändigt"},
    {id:"mo2", t:"Avlopp & galler i à la carte-köket", n:"Extra grundligt"} ],
  [ {id:"tu1", t:"Barnbuffé – skåp & väggar i SKAGERAK"},
    {id:"tu2", t:"Tak – KULL · BESÄTTNING · SKAGERAK"} ],
  [ {id:"we1", t:"Tak – SYD · NORD"},
    {id:"we2", t:"Avlopp & galler – SYD · NORD", n:"Extra grundligt"},
    {id:"we3", t:"Nattmat i mässen"} ],
  [ {id:"th1", t:"Avlopp & galler i SKAGERAK-köket", n:"Extra grundligt"} ],
  [ {id:"fr1", t:"Alla kyl- & värmeskåp i SKAGERAK-buffén"},
    {id:"fr2", t:"Ångrengöraren ända in i kanterna", n:"Glöm inte hörnen"} ],
  [ {id:"sa1", t:"Hiss"},
    {id:"sa2", t:"Spillbrickor från utsuget – runda i taket, KULL"},
    {id:"sa3", t:"Nattmat i mässen"} ],
  [ {id:"su1", t:"Filter & fläktkåpor – SKAGERAK", n:"Invändigt, utvändigt & kanter"},
    {id:"su2", t:"Fläktkåpor – KULL · BESÄTTNING · SYD · NORD", n:"Endast utvändigt & kanter"} ]
];

const DAILY = [
  { h:"Löpande ansvar", items:[
    {id:"d1", t:"Allt porslin & utrustning diskat och klart för kockar/servitörer"},
    {id:"d2", t:"Disken flyter smärtfritt – gästerna får en bra upplevelse"},
    {id:"d3", t:"Rent & i ordning runt kabyssen"} ]},
  { h:"Kväll – till ca 22:00", items:[
    {id:"d4", t:"Disktrasor, kökshanddukar & textil på däck 1"},
    {id:"d5", t:"Assistera kollegor med kvällsservice"} ]},
  { h:"Dagligt", items:[
    {id:"d6", t:"Skura golv i alla tre kök"},
    {id:"d7", t:"Städa upp i mässen"},
    {id:"d8", t:"Tvätta & fyll på trasor/handdukar – däck 1"},
    {id:"d9", t:"Fyll på i kabyssen"},
    {id:"d10", t:"Lås dörrarna till kabyssen"} ]},
  { h:"Innan passet slut", items:[
    {id:"d11", t:"Tvål-, papper- & lotiondispensrar fyllda i hela kabyssen"} ]}
];

const CUTOFF_HOUR = 6;
const realNow = new Date();
const now = new Date(realNow.getTime() - CUTOFF_HOUR*60*60*1000);
const isoDate = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
const STKEY = "natskyll:"+isoDate;
const wd = (now.getDay()+6)%7;
const WASH_ID = "wash";

let checked = {};
try { checked = JSON.parse(store.get(STKEY) || "{}") || {}; } catch(e){ checked = {}; }
function save(){ store.set(STKEY, JSON.stringify(checked)); }

const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#0E1419" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

function taskRow(item){
  const li = document.createElement("li");
  li.className = "task" + (checked[item.id] ? " done":"");
  li.innerHTML =
    '<span class="box">'+CHECK_SVG+'</span>'+
    '<span class="label">'+item.t+(item.n?'<span class="note">'+item.n+'</span>':'')+'</span>';
  li.addEventListener("click", () => { checked[item.id]=!checked[item.id]; li.classList.toggle("done",!!checked[item.id]); save(); updateProgress(); });
  return li;
}

function buildDeep(){
  const list = document.getElementById("deeplist"); list.innerHTML = "";
  DEEP[wd].forEach(it => list.appendChild(taskRow(it)));
}

function buildDaily(){
  const wrap = document.getElementById("dailywrap");
  wrap.innerHTML = '<div class="sec-h">Dagligt – varje pass</div>';
  DAILY.forEach(g => {
    const gh = document.createElement("div"); gh.className = "sec-h"; gh.style.marginTop="16px"; gh.textContent=g.h;
    const box = document.createElement("div"); box.className="group";
    const ul = document.createElement("ul"); ul.className="tasks";
    g.items.forEach(it => ul.appendChild(taskRow(it)));
    box.appendChild(ul); wrap.appendChild(gh); wrap.appendChild(box);
  });
}

function allIds(){ return [WASH_ID, ...DEEP[wd].map(x=>x.id), ...DAILY.flatMap(g=>g.items.map(x=>x.id))]; }
function updateProgress(){
  const ids = allIds(); const done = ids.filter(id=>checked[id]).length;
  const pct = ids.length ? Math.round(done/ids.length*100) : 0;
  document.getElementById("progfill").style.width = pct+"%";
  document.getElementById("progtxt").textContent = done+" av "+ids.length+" klara";
}

function buildWeek(){
  const wrap = document.getElementById("weekwrap"); wrap.innerHTML = "";
  WEEKDAYS.forEach((name,i) => {
    const d = document.createElement("div"); d.className = "wday" + (i===wd ? " today":"");
    let html = '<h4>'+name+(i===wd?'<span class="badge">idag</span>':'')+'</h4>';
    DEEP[i].forEach(it => { html += '<p>'+it.t+(it.n?' <span class="em">'+it.n+'</span>':'')+'</p>'; });
    d.innerHTML = html; wrap.appendChild(d);
  });
}

function buildRef(){
  const wrap = document.getElementById("refwrap"); wrap.innerHTML = "";
  DAILY.forEach(g => {
    const rg = document.createElement("div"); rg.className="rg";
    let html = '<h5>'+g.h+'</h5>';
    g.items.forEach(it => { html += '<p>'+it.t+'</p>'; });
    rg.innerHTML = html; wrap.appendChild(rg);
  });
}

document.getElementById("weekday").textContent = WEEKDAYS[wd];
document.getElementById("date").textContent = now.toLocaleDateString("sv-SE",{day:"numeric",month:"long"});
buildDeep(); buildDaily(); buildWeek(); buildRef(); updateProgress();

// First step: starta tvätt (+ vibration)
const fsEl = document.getElementById("firststep");
function renderFs(){ fsEl.classList.toggle("done", !!checked[WASH_ID]); }
fsEl.addEventListener("click", () => {
  checked[WASH_ID] = !checked[WASH_ID];
  renderFs(); save(); updateProgress();
  if (checked[WASH_ID] && navigator.vibrate) { try{ navigator.vibrate(60); }catch(e){} }
});
renderFs();

// Rast-påminnelse (fungerar när appen är öppen)
const BREAKS = [{ start:"18:40", end:"19:10", label:"Rast" }];
const chip = document.getElementById("breakchip");
const fired = {};
function todayAt(hhmm){ const [h,m]=hhmm.split(":").map(Number); const d=new Date(); d.setHours(h,m,0,0); return d; }
function fmtLeft(ms){ const min=Math.round(ms/60000); if(min<60) return "om "+min+" min"; const h=Math.floor(min/60), mm=min%60; return "om "+h+" h"+(mm?" "+mm+" min":""); }
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"), 20000);
  t.onclick=()=>t.classList.remove("show");
}
function fireBreak(b){
  if(navigator.vibrate){ try{ navigator.vibrate([250,120,250,120,250]); }catch(e){} }
  showToast("☕ Dags för rast – "+b.start);
}
function updateBreak(){
  const t=new Date(); let shown=false;
  for(const b of BREAKS){
    const s=todayAt(b.start), e=todayAt(b.end);
    if(t>=s && t<e){
      chip.style.display="inline-flex"; chip.className="breakchip now";
      chip.textContent="☕ "+b.label+" nu · till "+b.end; shown=true;
      if(!fired[b.start]){ fired[b.start]=true; fireBreak(b); }
    } else if(t<s){
      chip.style.display="inline-flex"; chip.className="breakchip";
      chip.textContent=b.label+" "+b.start+" · "+fmtLeft(s-t); shown=true;
    }
  }
  if(!shown) chip.style.display="none";
}
updateBreak();
setInterval(updateBreak, 20000);
BREAKS.forEach(b=>{ const ms=todayAt(b.start)-new Date(); if(ms>0 && ms<13*3600*1000){ setTimeout(updateBreak, ms+800); } });
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) updateBreak(); });

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-"+btn.dataset.tab).classList.add("active");
    window.scrollTo(0,0);
  });
});

document.getElementById("reset").addEventListener("click", () => {
  checked = {}; save();
  document.querySelectorAll(".task.done").forEach(el => el.classList.remove("done"));
  updateProgress();
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
</body>
</html>
